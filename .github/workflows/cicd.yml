name: CI/CD Pipeline

on:
  push:
      branches: 
        - main
        - guilherme
        - luan
  release:
    types: [published]

permissions:
  contents: read

jobs:

  # ETAPA 1 — TESTES UNITÁRIOS

  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest --junitxml=report.xml

      - name: Test success message
        if: success()
        run: echo "Tests passed successfully"

      - name: Test failure message
        if: failure()
        run: echo "Tests failed"

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml

  # ETAPA 2 — BUILD / EMPACOTAMENTO

  build:
    runs-on: ubuntu-latest
    needs:
      - tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build release distributions
        run: |
          python -m build

      - name: Build success message
        if: success()
        run: echo "Build completed successfully"

      - name: Build failure message
        if: failure()
        run: echo "Build failed"      

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  # ETAPA 3 — COBERTURA DE CÓDIGO

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs:
      - tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest --cov=downloader --cov=gui --cov=app --cov-report=html

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ETAPA 4 — DEPLOY / PUBLICAÇÃO

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build
      - coverage
    permissions:
      id-token: write
    if: ${{ false }}

    environment:
      name: pypi
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      # url: https://pypi.org/p/YOURPROJECT
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ETAPA 5 — NOTIFICAÇÃO

  notification:
    name: Send Notification
    runs-on: ubuntu-latest
    needs:
      - tests
      - build
      - coverage
      - pypi-publish
    if: always()

    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run notification script
        run: python script/sendNotification.py
